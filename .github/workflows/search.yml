name: Award Search

on:
  schedule:
    # 每 6 小时跑一次 (一天 4 次); 想一天一次就改成 "0 15 * * *"
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  issues: write
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run award search
        env:
          SEATS_AERO_API_KEY: ${{ secrets.SEATS_AERO_API_KEY }}
        run: python3 award_search.py | tee result.txt

      - name: Save latest result to repo
        run: cp result.txt latest.txt && git config user.name "github-actions" && git config user.email "actions@github.com" && git add latest.txt && (git commit -m "update latest result" || echo skip) && git push

      - name: Open issue if awards found
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if grep -q "共 .* 条" result.txt; then
            TITLE="有奖励票! $(date +'%Y-%m-%d %H:%M') UTC"
            {
              echo '```text'
              head -c 58000 result.txt
              echo ""
              echo '```'
            } > issue_body.txt
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body-file issue_body.txt
          else
            echo "本次没有搜到符合条件的票,不发通知。"
          fi
